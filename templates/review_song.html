<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Song Data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="review-container">
        <h1>Review Song Data</h1>
        <p>Please confirm the extracted details before analyzing.</p>

        <form action="/commit_song" method="POST">
            <input type="hidden" name="pdf_hash" value="{{ pdf_hash }}">
            <input type="hidden" name="name" value="{{ name }}">
            <input type="hidden" name="prefer_transpose_keys" value="{{ prefer_transpose_keys }}">

            <label>Title:</label>
            <input type="text" name="title" value="{{ metadata.get('title', name) if metadata else name }}"><br><br>

            <label>Author:</label>
            <input type="text" name="author" value="{{ metadata.get('author', '') if metadata else '' }}"><br><br>

            <label>CCLI Number:</label>
            <input type="text" name="ccli_number" value="{{ metadata.get('ccli_number', '') if metadata else '' }}"><br><br>

            <label>Year:</label>
            <input type="text" name="year" value="{{ metadata.get('year', '') if metadata else '' }}"><br><br>

            <h3>Crop Limits (Optional)</h3>
            <label>Min Note (MIDI):</label>
            <input type="number" name="min_note"><br><br>

            <label>Max Note (MIDI):</label>
            <input type="number" name="max_note"><br><br>

            <button type="submit">Confirm & Analyze</button>
        </form>
    </div>
</body>
</html>
